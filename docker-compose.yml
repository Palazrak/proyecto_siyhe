services:
  postgres:
    image: postgres:16-alpine
    container_name: multas_postgres
    environment:
      POSTGRES_DB: multasdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multasdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
