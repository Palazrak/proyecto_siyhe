services:
  - type: web
    name: multas-cdmx-web
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: multas-cdmx-db
          property: connectionString

databases:
  - name: multas-cdmx-db
    plan: free
