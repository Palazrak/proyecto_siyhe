<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Multas CDMX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <main class="page-shell">
    <div class="kt-portlet">
      <div class="kt-portlet__head">
        <div class="kt-portlet__head-label" id="title-pagos">
          <h4 class="cdmx-colorv">Consulta y pago de infracciones al reglamento de tránsito de la CDMX Administrador</h4>
        </div>
      </div>
      <div class="kt-pricing-3">
        <div class="kt-pricing-3__items">
          <div class="row row-no-padding login-row">
            <div class="col-lg-4 visual-col">
              <img class="col-lg-12 col-sm-2 col-xs-2" src="https://data.finanzas.cdmx.gob.mx/assets/img/logos/secure.jpg" alt="smaAdmin" title="smaAdmin" />
            </div>
            <div class="kt-pricing-3__item kt-pricing-3__item--brand col-lg-4 login-form-col">
              <div class="kt-pricing-3__wrapper p-0">
                <form class="kt-form" id="loginForm">
                  <div class="kt-portlet__body">
                    <div class="kt-section kt-section--first">
                      <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" id="usuario" name="usuario" class="form-control" placeholder="Ingresa usuario" maxlength="20" required>
                        <span class="form-text text-muted">Por favor ingresa usuario</span>
                      </div>
                      <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Ingresa contraseña" maxlength="20" required>
                        <span class="form-text text-muted">Por favor ingresa contraseña</span>
                      </div>
                    </div>
                  </div>
                  <div class="kt-portlet__foot">
                    <div class="kt-form__actions">
                      <button type="submit" class="btn btn-cdmx">Ingresar</button>
                    </div>
                  </div>
                </form>
                <p id="feedback" class="feedback"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/js/login.js"></script>
</body>
</html>
